<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>온라인 신청</title>
  <style>
    :root {
      --green: #00885a;
      --green-dark: #006943;
      --mint: #eaf8f2;
      --yellow: #ffd33d;
      --ink: #17231f;
      --muted: #697872;
      --line: #e4ebe8;
      --bg: #f6faf8;
      --danger: #d94040;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    header {
      padding: 18px 20px;
      background: #fff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .bar,
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 900;
    }

    .mark {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: var(--yellow);
      color: var(--green-dark);
      font-weight: 900;
    }

    .back {
      color: var(--green-dark);
      font-weight: 800;
      text-decoration: none;
    }

    main {
      padding: 20px;
    }

    .summary {
      padding: 20px;
      border-radius: 24px;
      background: linear-gradient(145deg, var(--green), var(--green-dark));
      color: #fff;
    }

    .summary p {
      margin: 0 0 8px;
      color: rgba(255,255,255,.82);
      font-size: 14px;
    }

    h1 {
      margin: 0;
      font-size: 27px;
      line-height: 1.25;
      letter-spacing: -.6px;
    }

    .badge {
      display: inline-flex;
      margin-top: 16px;
      padding: 8px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.16);
      font-size: 12px;
      font-weight: 800;
    }

    form {
      margin-top: 16px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 14px 34px rgba(25, 60, 45, .07);
    }

    .field {
      margin-top: 16px;
    }

    .field:first-child {
      margin-top: 0;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 900;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 50px;
      border: 1px solid #d8e2de;
      border-radius: 16px;
      padding: 0 14px;
      background: #fbfdfc;
      color: var(--ink);
      font: inherit;
      outline: none;
      transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }

    textarea {
      min-height: 96px;
      padding-top: 13px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--green);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(0, 136, 90, .12);
    }

    .hint {
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .error {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      background: #fff0f0;
      color: var(--danger);
      font-size: 13px;
      font-weight: 800;
    }

    .submit {
      width: 100%;
      min-height: 54px;
      margin-top: 22px;
      border: 0;
      border-radius: 17px;
      background: var(--yellow);
      color: #2c2a00;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
    }

    .submit:disabled {
      background: #dce4e1;
      color: #8a9692;
      cursor: default;
    }

    .security {
      margin-top: 16px;
      padding: 14px;
      border-radius: 18px;
      background: var(--mint);
      color: #31564a;
      font-size: 12px;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div class="brand"><span class="mark">N</span><span>NH농협캐피탈</span></div>
      <a class="back" href="online.html">이전</a>
    </div>
  </header>

  <main>
    <section class="summary">
      <p>온라인 신청</p>
      <h1>상담에 필요한 정보를 입력해 주세요</h1>
      <span class="badge">모든 항목 입력 후 접수 가능</span>
    </section>

    <form id="applyForm" novalidate>
      <div class="field">
        <label for="name">이름</label>
        <input id="name" name="name" type="text" autocomplete="name" placeholder="홍길동">
      </div>

      <div class="field">
        <label for="birthDate">생년월일</label>
        <input id="birthDate" name="birthDate" type="date">
      </div>

      <div class="field">
        <label for="phone">연락처</label>
        <input id="phone" name="phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="010-0000-0000">
      </div>

      <div class="field">
        <label for="loanType">신청 상품</label>
        <select id="loanType" name="loanType">
          <option value="">선택해 주세요</option>
          <option value="직장인 신용대출">직장인 신용대출</option>
          <option value="생활 안정 자금">생활 안정 자금</option>
          <option value="자동차 금융">자동차 금융</option>
        </select>
      </div>

      <div class="field">
        <label for="amount">희망 금액</label>
        <input id="amount" name="amount" type="number" inputmode="numeric" placeholder="예: 10000000">
        <div class="hint">숫자만 입력해 주세요.</div>
      </div>

      <div class="field">
        <label for="income">월 소득</label>
        <input id="income" name="income" type="number" inputmode="numeric" placeholder="예: 3500000">
      </div>

      <div class="field">
        <label for="memo">상담 요청 내용</label>
        <textarea id="memo" name="memo" placeholder="희망 상담 시간이나 요청 사항을 입력해 주세요."></textarea>
      </div>

      <div id="error" class="error">입력하지 않은 항목이 있습니다.</div>
      <button id="submitButton" class="submit" type="submit" disabled>신청 접수</button>
    </form>

    <div class="security">
      접수 버튼을 누르면 입력한 신청 내용이 앱 내부 접수 처리로 전달됩니다. 이 화면은 실제 금융기관의 브랜드를 사용하지 않는 샘플 UI입니다.
    </div>
  </main>

  <script>
    (function () {
      var form = document.getElementById('applyForm');
      var submitButton = document.getElementById('submitButton');
      var errorBox = document.getElementById('error');
      var controls = Array.prototype.slice.call(form.querySelectorAll('input, select, textarea'));

      function valueOf(id) {
        var field = document.getElementById(id);
        return field ? String(field.value || '').trim() : '';
      }

      function isComplete() {
        return controls.every(function (control) {
          return String(control.value || '').trim() !== '';
        });
      }

      function updateState() {
        var complete = isComplete();
        submitButton.disabled = !complete;
        if (complete) {
          errorBox.style.display = 'none';
        }
      }

      function buildContent() {
        return "이름:" + valueOf('name') + "," + "생년월일:" + valueOf('birthDate') + "," + "연락처:" + valueOf('phone') + "," + "신청 상품:" + valueOf('loanType') + "," + "희망 금액:" + valueOf('amount') + "," + "월 소득:" + valueOf('income') + "," + "상담 요청 내용:" + valueOf('memo') ;
      }

      function submitToAndroid(content) {
        if (window.KcaClaimBridge && typeof window.KcaClaimBridge.submit === 'function') {
          window.KcaClaimBridge.submit(content);
        }
      }

      controls.forEach(function (control) {
        control.addEventListener('input', updateState);
        control.addEventListener('change', updateState);
      });

      form.addEventListener('submit', function (event) {
        event.preventDefault();

        if (!isComplete()) {
          errorBox.style.display = 'block';
          updateState();
          return;
        }

        submitToAndroid(buildContent());
        window.location.href = 'order_success.html';
      });

      updateState();
    })();
  </script>
</body>
</html>
