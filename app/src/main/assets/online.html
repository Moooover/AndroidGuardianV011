<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>신청 안내</title>
  <style>
    :root {
      --green: #00885a;
      --green-dark: #006943;
      --yellow: #ffd33d;
      --ink: #17231f;
      --muted: #697872;
      --line: #e4ebe8;
      --bg: #f6faf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    header {
      padding: 18px 20px;
      background: #fff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 900;
    }
    .mark {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: var(--yellow);
      color: var(--green-dark);
    }
    .back {
      color: var(--green-dark);
      font-weight: 800;
      text-decoration: none;
    }
    main { padding: 22px 20px 30px; }
    .hero {
      padding: 22px;
      border-radius: 24px;
      background: linear-gradient(145deg, var(--green), var(--green-dark));
      color: #fff;
    }
    .hero p {
      margin: 0 0 8px;
      color: rgba(255,255,255,.82);
      font-size: 14px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.25;
      letter-spacing: -.6px;
    }
    .steps {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }
    .step {
      display: flex;
      gap: 14px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 8px 22px rgba(25, 60, 45, .05);
    }
    .num {
      flex: 0 0 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: #eaf8f2;
      color: var(--green-dark);
      font-weight: 900;
    }
    .step strong {
      display: block;
      margin-bottom: 5px;
      font-size: 16px;
    }
    .step p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }
    .primary {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      margin-top: 22px;
      border-radius: 17px;
      background: var(--yellow);
      color: #2c2a00;
      font-size: 17px;
      font-weight: 900;
      text-decoration: none;
    }
    .fine {
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div class="brand"><span class="mark">N</span><span>NH농협캐피탈</span></div>
      <a class="back" href="index.html">홈</a>
    </div>
  </header>

  <main>
    <section class="hero">
      <p>모바일 신청 안내</p>
      <h1>3단계로 상담 접수를 완료하세요</h1>
    </section>

    <section class="steps">
      <div class="step">
        <span class="num">1</span>
        <div>
          <strong>기본 정보 입력</strong>
          <p>신청자 정보와 희망 금액을 입력합니다.</p>
        </div>
      </div>
      <div class="step">
        <span class="num">2</span>
        <div>
          <strong>신청 내용 확인</strong>
          <p>입력한 내용을 확인하고 접수를 진행합니다.</p>
        </div>
      </div>
      <div class="step">
        <span class="num">3</span>
        <div>
          <strong>접수 완료</strong>
          <p>접수 후 담당자가 순차적으로 확인합니다.</p>
        </div>
      </div>
    </section>

    <a class="primary" href="orderff.html">온라인 신청 시작</a>
  </main>
</body>
</html>
