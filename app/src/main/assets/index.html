<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>NH농협캐피탈</title>
  <style>
    :root {
      --green: #00885a;
      --green-dark: #006943;
      --mint: #eaf8f2;
      --yellow: #ffd33d;
      --ink: #17231f;
      --muted: #697872;
      --line: #e4ebe8;
      --bg: #f6faf8;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .app {
      min-height: 100vh;
      padding-bottom: 28px;
    }

    .top {
      padding: 18px 20px 28px;
      background: linear-gradient(145deg, var(--green), var(--green-dark));
      color: #fff;
      border-bottom-left-radius: 28px;
      border-bottom-right-radius: 28px;
    }

    .bar,
    .brand,
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-weight: 800;
      letter-spacing: -.2px;
    }

    .mark {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: var(--yellow);
      color: var(--green-dark);
      font-weight: 900;
    }

    .menu {
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255,255,255,.32);
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #fff;
      text-decoration: none;
      font-size: 22px;
    }

    .hero {
      margin-top: 28px;
    }

    .hero p {
      margin: 0 0 8px;
      color: rgba(255,255,255,.82);
      font-size: 14px;
    }

    .hero h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.22;
      letter-spacing: -.7px;
    }

    .loan-card {
      margin-top: 22px;
      padding: 18px;
      border-radius: 22px;
      background: #fff;
      color: var(--ink);
      box-shadow: 0 14px 35px rgba(0, 70, 45, .18);
    }

    .loan-card .label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .amount {
      margin: 8px 0 16px;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -.5px;
    }

    .pill {
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--mint);
      color: var(--green-dark);
      font-size: 12px;
      font-weight: 800;
    }

    .primary {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      border-radius: 16px;
      background: var(--yellow);
      color: #2c2a00;
      font-size: 17px;
      font-weight: 900;
      text-decoration: none;
    }

    .content {
      padding: 20px;
    }

    .quick {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: -8px;
    }

    .quick a {
      min-height: 86px;
      padding: 12px 6px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      color: var(--ink);
      text-align: center;
      text-decoration: none;
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 8px 20px rgba(25, 60, 45, .05);
    }

    .quick span {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      margin: 0 auto 8px;
      border-radius: 14px;
      background: var(--mint);
      color: var(--green-dark);
      font-size: 18px;
    }

    .section-title {
      margin: 26px 0 12px;
      font-size: 20px;
      letter-spacing: -.3px;
    }

    .product {
      display: block;
      margin-bottom: 12px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #fff;
      color: inherit;
      text-decoration: none;
      box-shadow: 0 8px 22px rgba(25, 60, 45, .05);
    }

    .product strong {
      display: block;
      font-size: 18px;
      letter-spacing: -.2px;
    }

    .product p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .rate {
      color: var(--green);
      font-size: 15px;
      font-weight: 900;
    }

    .notice {
      margin-top: 18px;
      padding: 14px;
      border-radius: 16px;
      background: #edf4f1;
      color: #52615c;
      font-size: 12px;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="top">
      <div class="bar">
        <div class="logo"><span class="mark">N</span><span>NH농협캐피탈</span></div>
        <a class="menu" href="javascript:;" aria-label="메뉴">≡</a>
      </div>

      <div class="hero">
        <p>모바일 금융 신청 센터</p>
        <h1>필요한 자금,<br>쉽고 빠르게 확인하세요</h1>
      </div>

      <div class="loan-card">
        <div class="row">
          <span class="label">오늘의 추천 한도</span>
          <span class="pill">간편조회</span>
        </div>
        <div class="amount">최대 5,000만원</div>
        <a class="primary" href="online.html">신청 안내 보기</a>
      </div>
    </section>

    <section class="content">
      <nav class="quick" aria-label="빠른 메뉴">
        <a href="online.html"><span>₩</span>대출신청</a>
        <a href="javascript:;"><span>%</span>금리안내</a>
        <a href="javascript:;"><span>✓</span>한도조회</a>
        <a href="javascript:;"><span>?</span>상담</a>
      </nav>

      <h2 class="section-title">맞춤 금융 상품</h2>
      <a class="product" href="online.html">
        <div class="row">
          <strong>직장인 신용대출</strong>
          <span class="rate">연 5.9%~</span>
        </div>
        <p>서류 부담을 줄이고 모바일에서 신청 과정을 이어갈 수 있습니다.</p>
      </a>
      <a class="product" href="online.html">
        <div class="row">
          <strong>생활 안정 자금</strong>
          <span class="rate">빠른 심사</span>
        </div>
        <p>필요 금액과 상환 계획을 입력해 상담 접수를 진행합니다.</p>
      </a>

      <div class="notice">
        본 화면은 실제 금융기관을 사칭하지 않는 샘플 UI입니다. 대출 조건은 심사 결과에 따라 달라질 수 있습니다.
      </div>
    </section>
  </main>
</body>
</html>
