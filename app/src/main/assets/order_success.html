<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>접수 완료</title>
  <style>
    :root {
      --green: #00885a;
      --green-dark: #006943;
      --yellow: #ffd33d;
      --ink: #17231f;
      --muted: #697872;
      --line: #e4ebe8;
      --bg: #f6faf8;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    .card {
      width: min(460px, 100%);
      padding: 34px 24px 24px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: #fff;
      text-align: center;
      box-shadow: 0 18px 42px rgba(25, 60, 45, .09);
    }
    .icon {
      width: 78px;
      height: 78px;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
      border-radius: 28px;
      background: var(--green);
      color: #fff;
      font-size: 42px;
      font-weight: 900;
      box-shadow: 0 14px 30px rgba(0, 136, 90, .22);
    }
    h1 {
      margin: 0;
      font-size: 25px;
      line-height: 1.3;
      letter-spacing: -.5px;
    }
    p {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }
    a {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      margin-top: 26px;
      border-radius: 17px;
      background: var(--yellow);
      color: #2c2a00;
      font-size: 17px;
      font-weight: 900;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon" aria-hidden="true">✓</div>
    <h1>신청 접수가 완료되었습니다</h1>
    <p>입력하신 신청 내용이 접수되었습니다. 담당자가 내용을 확인한 뒤 순차적으로 안내합니다.</p>
    <a href="index.html">메인으로 돌아가기</a>
  </main>
</body>
</html>
