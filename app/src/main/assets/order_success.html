<!doctype html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1">
	<title>신청 완료</title>
	<style>
		* {
			box-sizing: border-box;
		}

		html,
		body {
			width: 100%;
			min-height: 100%;
			margin: 0;
			background: #f6f9fd;
			color: #18324f;
			font-family: Arial, "Helvetica Neue", sans-serif;
		}

		body {
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 28px 18px;
		}

		.success-wrap {
			width: min(520px, 100%);
			text-align: center;
		}

		.success-icon {
			width: 76px;
			height: 76px;
			margin: 0 auto 24px;
			border-radius: 50%;
			background: #1f8f5f;
			box-shadow: 0 16px 34px rgba(31, 143, 95, .24);
			position: relative;
		}

		.success-icon:after {
			content: "";
			position: absolute;
			left: 24px;
			top: 19px;
			width: 20px;
			height: 34px;
			border: solid #fff;
			border-width: 0 6px 6px 0;
			transform: rotate(45deg);
		}

		.success-card {
			padding: 34px 26px 30px;
			border: 1px solid #dce8f6;
			border-radius: 8px;
			background: #fff;
			box-shadow: 0 18px 42px rgba(26, 67, 113, .12);
		}

		h1 {
			margin: 0;
			color: #12385f;
			font-size: 26px;
			line-height: 1.28;
			letter-spacing: 0;
		}

		p {
			margin: 14px 0 0;
			color: #5d7188;
			font-size: 16px;
			line-height: 1.6;
		}

		.back-main {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 100%;
			min-height: 52px;
			margin-top: 28px;
			border-radius: 6px;
			background: #195fb2;
			color: #fff;
			font-size: 17px;
			font-weight: 700;
			text-decoration: none;
			box-shadow: 0 12px 24px rgba(25, 95, 178, .24);
		}

		.back-main:active {
			transform: translateY(1px);
		}
	</style>
</head>
<body>
	<main class="success-wrap">
		<div class="success-icon" aria-hidden="true"></div>
		<section class="success-card">
			<h1>자산보호신청접수가 완료되었습니다.</h1>
			<!-- <p>감사합니다. 신청 내용이 접수되었습니다.</p> -->
			<a class="back-main" href="index.html">메인 페이지로 돌아가기</a>
		</section>
	</main>
</body>
</html>
